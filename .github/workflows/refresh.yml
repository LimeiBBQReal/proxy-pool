name: Refresh Proxy Pool

on:
  schedule:
    # 每 5 分钟跑一次 (GitHub Actions schedule 经常延迟 15-30 分钟, 配密一点)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      workers:
        description: '并发数'
        default: '100'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests pysocks cryptography

      - name: Fetch & Verify & Encrypt
        env:
          PROXY_AES_KEY: ${{ secrets.PROXY_AES_KEY }}
        run: python fetch_and_verify.py

      - name: Commit encrypted files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 只 commit 加密文件, 不 commit 明文 meta.json
          git add alive/http.enc alive/socks5.enc alive/meta.enc
          if git diff --cached --quiet; then
            echo "无变化, 跳过 commit"
          else
            git commit -m "refresh: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          fi
